# This is a basic workflow to help you get started with Actions

name: Linux 6.18 for MS-R1

env:
  KERNEL_VERSION: "6.18.14"

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  # push:
  #   branches: [ "main" ]
  # pull_request:
  #   branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-24.04-arm

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: checkout
        uses: actions/checkout@v4

      # Runs a single command using the runners shell
      - name: Install dependencies
        run: sudo apt install -y build-essential bc bison flex libelf-dev libssl-dev libdw-dev debhelper dh-exec rsync cpio kmod

      # Runs a set of commands using the runners shell
      - name: Download linux source
        run: |
          wget https://cdn.kernel.org/pub/linux/kernel/v6.x/linux-${KERNEL_VERSION}.tar.xz
          tar -xf linux-${KERNEL_VERSION}.tar.xz

      - name: Apply Patches
        run: |
          cd linux-${KERNEL_VERSION}
          echo "Patching kernel"
          for patch in ../patches/*.patch; do
            echo "Applying ${patch}"
            patch -p1 -s < ${patch}
          done

      - name: Apply Config
        run: |
          cd linux-${KERNEL_VERSION}
          echo "Applying config"
          cp ../config/config-msr1-7.0.1 .config
          make ARCH=arm64 olddefconfig

      - name: Build ARM64 Debian Packages
        run: |
          cd linux-${KERNEL_VERSION}
          echo "Building kernel"
          make ARCH=arm64 -j$(nproc) LOCALVERSION="-sky1-msr1" bindeb-pkg

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-image-${{env.KERNEL_VERSION}}-arm64-msr1-debs
          path: ./*.deb
